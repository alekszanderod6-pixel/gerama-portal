<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GERAMA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-container {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0a2f1f, #1B5E20);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-header img { width: 80px; margin-bottom: 1rem; }
        .login-header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .login-header p { font-size: 0.9rem; opacity: 0.85; }
        .login-body { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e2a3e; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #FFC107, #FFD54F);
            color: #1B5E20;
            transform: translateY(-2px);
        }
        .error-message {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            text-align: center;
        }
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .signup-link a { color: #1B5E20; text-decoration: none; font-weight: 600; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            10%,30%,50%,70%,90%{transform:translateX(-5px)}
            20%,40%,60%,80%{transform:translateX(5px)}
        }
        .shake { animation: shake 0.5s ease-in-out; }
        @media (max-width:480px){ .login-body{ padding:1.5rem; } .login-header{ padding:1.5rem; } }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="login-container" id="loginCard">
        <div class="login-header">
            <img src="https://uenr.edu.gh/themes/custom/uenr/logo.svg" alt="UENR">
            <h1>GERAMA Portal</h1>
            <p>Access academic resources & learning materials</p>
        </div>
        <div class="login-body">
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="text" id="username" autocomplete="off" placeholder="Enter your email or username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" autocomplete="new-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Sign In →</button>
                <div id="errorMsg" class="error-message"></div>
            </form>
            <div class="signup-link">
                Don't have an account? <a href="signup.html">Join GERAMA</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginCard = document.getElementById('loginCard');
            
            // Show loading state
            errorMsg.innerText = 'Signing in...';
            
            try {
                // Sign in with Supabase
                const { data, error } = await window.geramaSupabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    errorMsg.innerText = error.message;
                    loginCard.classList.add('shake');
                    setTimeout(() => loginCard.classList.remove('shake'), 500);
                    document.getElementById('password').value = '';
                    return;
                }
                
                // Check if user has invite code verified
                if (!data.user.user_metadata.invite_code_verified) {
                    errorMsg.innerText = 'Account not verified. Please contact admin.';
                    await window.geramaSupabase.auth.signOut();
                    return;
                }
                
                // Store session and profile
                sessionStorage.setItem('gerama_loggedIn', 'true');
                
                // Update profile in localStorage for sidebar
                const username = data.user.user_metadata.username || email.split('@')[0];
                localStorage.setItem('gerama_profile', JSON.stringify({
                    name: username,
                    program: 'GERAMA Member',
                    img: 'https://via.placeholder.com/80?text=' + username.charAt(0).toUpperCase()
                }));
                
                // Redirect to home page
                window.location.href = 'index.html';
                
            } catch (err) {
                errorMsg.innerText = 'Login failed. Please try again.';
                loginCard.classList.add('shake');
                setTimeout(() => loginCard.classList.remove('shake'), 500);
                document.getElementById('password').value = '';
                console.error('Login error:', err);
            }
        });
        
        // Check if user is already logged in
        window.geramaSupabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
