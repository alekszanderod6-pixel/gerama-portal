<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | GERAMA Portal</title>
    <link rel="icon" type="image/jpg" href="images/geramalogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .reset-container {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .reset-header {
            background: linear-gradient(135deg, #0a2f1f, #1B5E20);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .reset-header img { width: 80px; margin-bottom: 1rem; }
        .reset-header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .reset-header p { font-size: 0.9rem; opacity: 0.85; }
        .reset-body { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e2a3e; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
        }
        .btn-reset {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset:hover {
            background: linear-gradient(135deg, #FFC107, #FFD54F);
            color: #1B5E20;
            transform: translateY(-2px);
        }
        .message { margin-top: 1rem; text-align: center; font-size: 0.85rem; }
        .error { color: #dc2626; }
        .success { color: #16a34a; }
        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .login-link a { color: #1B5E20; text-decoration: none; font-weight: 600; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            10%,30%,50%,70%,90%{transform:translateX(-5px)}
            20%,40%,60%,80%{transform:translateX(5px)}
        }
        .shake { animation: shake 0.5s ease-in-out; }
        @media (max-width:480px){ .reset-body{ padding:1.5rem; } .reset-header{ padding:1.5rem; } }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="reset-container" id="resetCard">
        <div class="reset-header">
            <img src="images/geramalogo.jpg" alt="GERAMA">
            <h1>Reset Password</h1>
            <p>Set your new password</p>
        </div>
        <div class="reset-body">
            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn-reset">Reset Password</button>
                <div id="message" class="message"></div>
            </form>
            <div class="login-link">
                Remember your password? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const resetCard = document.getElementById('resetCard');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                messageDiv.innerHTML = '<span class="error">Passwords do not match.</span>';
                resetCard.classList.add('shake');
                setTimeout(() => resetCard.classList.remove('shake'), 500);
                return;
            }
            
            // Check password strength
            if (newPassword.length < 6) {
                messageDiv.innerHTML = '<span class="error">Password must be at least 6 characters long.</span>';
                resetCard.classList.add('shake');
                setTimeout(() => resetCard.classList.remove('shake'), 500);
                return;
            }
            
            // Check if Supabase is loaded
            if (typeof window.geramaSupabase === 'undefined') {
                messageDiv.innerHTML = '<span class="error">Authentication service not available. Please refresh.</span>';
                return;
            }
            
            messageDiv.innerHTML = '<span class="success">Resetting password...</span>';
            
            try {
                // Get current session from URL hash (Supabase method)
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                
                console.log('Reset page loaded with tokens:', { 
                    hasAccessToken: !!accessToken, 
                    hasRefreshToken: !!refreshToken,
                    hash: window.location.hash 
                });
                
                if (!accessToken) {
                    messageDiv.innerHTML = '<span class="error">Invalid or expired reset link. Please request a new password reset.</span>';
                    console.error('No access token found in URL');
                    return;
                }
                
                // Set session with the tokens from the reset link
                const { data: sessionData, error: sessionError } = await window.geramaSupabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                
                if (sessionError) {
                    messageDiv.innerHTML = '<span class="error">Invalid reset link. Please request a new one.</span>';
                    return;
                }
                
                // Update user password
                const { data, error } = await window.geramaSupabase.auth.updateUser({
                    password: newPassword
                });
                
                if (error) {
                    messageDiv.innerHTML = '<span class="error">Failed to reset password. Please try again.</span>';
                    return;
                }
                
                messageDiv.innerHTML = '<span class="success">Password reset successfully! Redirecting to login...</span>';
                
                // Sign out and redirect to login after 2 seconds
                await window.geramaSupabase.auth.signOut();
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                
            } catch (err) {
                messageDiv.innerHTML = '<span class="error">Error resetting password. Please try again.</span>';
            }
        });
    </script>
</body>
</html>
