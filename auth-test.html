<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth | GERAMA Portal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #1B5E20; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .message { margin-top: 15px; padding: 10px; border-radius: 4px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>GERAMA Authentication Test</h1>
    
    <div>
        <h2>Sign Up</h2>
        <form id="signupForm">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="signupPassword" required>
            </div>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="signupUsername" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <div id="signupMessage"></div>
    </div>
    
    <hr style="margin: 30px 0;">
    
    <div>
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage"></div>
    </div>

    <script>
        // Initialize Supabase
        const { createClient } = window.supabase;
        const supabase = createClient(
            'https://hdrnnvvrtbwjsxtrxzfj.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhkcm5udnZydGJ3anN4dHJ4emZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjQ3MTgsImV4cCI6MjA5MjEwMDcxOH0.rEHkz3HOoXArRkasGSaxK6JQZrQHI2LAJ7c6Dj8DaQI'
        );

        // Sign up
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const username = document.getElementById('signupUsername').value;
            const messageDiv = document.getElementById('signupMessage');
            
            try {
                console.log('Attempting signup...');
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            username: username,
                            invite_code_verified: true
                        }
                    }
                });
                
                console.log('Signup result:', { data, error });
                
                if (error) {
                    messageDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="success">Account created! User: ${data.user?.email || 'Success'}</div>`;
                    
                    // Try immediate login
                    if (data.user) {
                        const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({
                            email: email,
                            password: password
                        });
                        
                        if (!loginError && loginData.user) {
                            messageDiv.innerHTML += `<div class="success">Auto-login successful! Session active.</div>`;
                        } else {
                            messageDiv.innerHTML += `<div class="error">Auto-login failed: ${loginError?.message}</div>`;
                        }
                    }
                }
            } catch (err) {
                console.error('Signup error:', err);
                messageDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            try {
                console.log('Attempting login...');
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                console.log('Login result:', { data, error });
                
                if (error) {
                    messageDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="success">Login successful! User: ${data.user?.email}</div>`;
                }
            } catch (err) {
                console.error('Login error:', err);
                messageDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
