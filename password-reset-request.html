<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Request | GERAMA Portal</title>
    <link rel="icon" type="image/jpg" href="images/geramalogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .reset-container {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .reset-header {
            background: linear-gradient(135deg, #0a2f1f, #1B5E20);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .reset-header img { width: 80px; margin-bottom: 1rem; }
        .reset-header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .reset-header p { font-size: 0.9rem; opacity: 0.85; }
        .reset-body { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e2a3e; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
        }
        .btn-reset {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset:hover {
            background: linear-gradient(135deg, #FFC107, #FFD54F);
            color: #1B5E20;
            transform: translateY(-2px);
        }
        .message { margin-top: 1rem; text-align: center; font-size: 0.85rem; }
        .error { color: #dc2626; }
        .success { color: #16a34a; }
        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .login-link a { color: #1B5E20; text-decoration: none; font-weight: 600; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            10%,30%,50%,70%,90%{transform:translateX(-5px)}
            20%,40%,60%,80%{transform:translateX(5px)}
        }
        .shake { animation: shake 0.5s ease-in-out; }
        @media (max-width:480px){ .reset-body{ padding:1.5rem; } .reset-header{ padding:1.5rem; } }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="reset-container" id="resetCard">
        <div class="reset-header">
            <img src="images/geramalogo.jpg" alt="GERAMA">
            <h1>Password Reset</h1>
            <p>Enter your email to reset your password</p>
        </div>
        <div class="reset-body">
            <form id="resetRequestForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn-reset">Send Reset Link</button>
                <div id="message" class="message"></div>
            </form>
            <div class="login-link">
                Remember your password? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        // Initialize EmailJS
        (function() {
            emailjs.init("pFgWBm_9mi8sQ5Zdb");
        })();

        // Generate secure reset token
        function generateResetToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 32; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        // Store reset request
        function storeResetRequest(email, token) {
            const resetRequests = JSON.parse(localStorage.getItem('gerama_reset_requests') || '[]');
            resetRequests.push({
                email: email,
                token: token,
                timestamp: new Date().toISOString(),
                used: false
            });
            localStorage.setItem('gerama_reset_requests', JSON.stringify(resetRequests));
        }

        document.getElementById('resetRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value.trim();
            const messageDiv = document.getElementById('message');
            const resetCard = document.getElementById('resetCard');
            
            // Validate email
            if (!email || !email.includes('@')) {
                messageDiv.innerHTML = '<span class="error">Please enter a valid email address.</span>';
                resetCard.classList.add('shake');
                setTimeout(() => resetCard.classList.remove('shake'), 500);
                return;
            }
            
            // Show loading state
            messageDiv.innerHTML = '<span class="success">Sending reset link...</span>';
            
            try {
                // Generate reset token and link
                const resetToken = generateResetToken();
                const resetLink = `${window.location.origin}/reset-password.html?token=${resetToken}&email=${encodeURIComponent(email)}`;
                
                // Store reset request
                storeResetRequest(email, resetToken);
                
                // Send branded email via EmailJS
                const templateParams = {
                    to_email: email,
                    to_name: email.split('@')[0],
                    reset_link: resetLink,
                    from_name: 'GERAMA Portal',
                    support_email: 'gerama.uenr@gmail.com',
                    support_phone: '+233 55 574 9497'
                };
                
                // Use the admin template for now, you can create a dedicated password reset template
                await emailjs.send('Gerama_Gmail_Service', 'geramareset_ei9ahk9', templateParams);
                
                messageDiv.innerHTML = '<span class="success">Password reset link sent! Check your email inbox.</span>';
                
                // Clear form
                document.getElementById('resetEmail').value = '';
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch (error) {
                console.error('Reset request error:', error);
                messageDiv.innerHTML = '<span class="error">Failed to send reset link. Please try again or contact support.</span>';
            }
        });
    </script>
</body>
</html>
