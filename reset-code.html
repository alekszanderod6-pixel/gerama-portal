<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | GERAMA Portal</title>
    <link rel="icon" type="image/jpg" href="images/geramalogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .reset-container {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .reset-header {
            background: linear-gradient(135deg, #0a2f1f, #1B5E20);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .reset-header img { width: 80px; margin-bottom: 1rem; }
        .reset-header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .reset-header p { font-size: 0.9rem; opacity: 0.85; }
        .reset-body { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e2a3e; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
        }
        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }
        .btn:hover {
            background: linear-gradient(135deg, #FFC107, #FFD54F);
            color: #1B5E20;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #6b7280;
        }
        .btn-secondary:hover {
            background: #4b5563;
            color: white;
        }
        .message { margin-top: 1rem; text-align: center; font-size: 0.85rem; }
        .error { color: #dc2626; }
        .success { color: #16a34a; }
        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .login-link a { color: #1B5E20; text-decoration: none; font-weight: 600; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            10%,30%,50%,70%,90%{transform:translateX(-5px)}
            20%,40%,60%,80%{transform:translateX(5px)}
        }
        .shake { animation: shake 0.5s ease-in-out; }
        .step { display: none; }
        .step.active { display: block; }
        .code-input {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }
        .code-input input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }
        .code-input input:focus {
            border-color: #FFC107;
            outline: none;
        }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="reset-container" id="resetCard">
        <div class="reset-header">
            <img src="images/geramalogo.jpg" alt="GERAMA">
            <h1>Reset Password</h1>
            <p>Recover your account access</p>
        </div>
        <div class="reset-body">
            <!-- Step 1: Enter Email -->
            <div id="step1" class="step active">
                <form id="emailForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email address" required>
                    </div>
                    <button type="submit" class="btn">Send Reset Code</button>
                    <div id="emailMessage" class="message"></div>
                </form>
            </div>

            <!-- Step 2: Enter Code -->
            <div id="step2" class="step">
                <form id="codeForm">
                    <p style="text-align: center; margin-bottom: 1rem; color: #666;">
                        Enter the 6-digit code sent to your email
                    </p>
                    <div class="code-input">
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                    </div>
                    <button type="submit" class="btn">Verify Code</button>
                    <button type="button" class="btn btn-secondary" onclick="goToStep(1)">Back</button>
                    <div id="codeMessage" class="message"></div>
                </form>
            </div>

            <!-- Step 3: New Password -->
            <div id="step3" class="step">
                <form id="passwordForm">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    <button type="submit" class="btn">Reset Password</button>
                    <div id="passwordMessage" class="message"></div>
                </form>
            </div>
        </div>
        <div class="login-link">
            Remember your password? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        let resetCode = '';
        let userEmail = '';

        function goToStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(`step${stepNumber}`).classList.add('active');
        }

        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // Email form submission
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('emailMessage');
            
            if (!email) {
                messageDiv.innerHTML = '<span class="error">Please enter your email address.</span>';
                return;
            }

            try {
                messageDiv.innerHTML = '<span class="success">Sending reset code...</span>';
                
                // Generate reset code
                resetCode = generateCode();
                userEmail = email;
                
                // Store reset code in localStorage (in production, use database)
                localStorage.setItem(`reset_${email}`, resetCode);
                localStorage.setItem(`reset_time_${email}`, Date.now());
                
                // For now, show the code in console (in production, send email)
                console.log(`Reset code for ${email}: ${resetCode}`);
                messageDiv.innerHTML = `<span class="success">Reset code sent! Check your email. (Code: ${resetCode} - for testing)</span>`;
                
                // Move to step 2 after 2 seconds
                setTimeout(() => goToStep(2), 2000);
                
            } catch (error) {
                messageDiv.innerHTML = '<span class="error">Failed to send reset code. Please try again.</span>';
                console.error('Reset code error:', error);
            }
        });

        // Code input handling
        document.querySelectorAll('.code-input input').forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < 5) {
                    document.querySelectorAll('.code-input input')[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    document.querySelectorAll('.code-input input')[index - 1].focus();
                }
            });
        });

        // Code form submission
        document.getElementById('codeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('codeMessage');
            
            const enteredCode = Array.from(document.querySelectorAll('.code-input input'))
                .map(input => input.value)
                .join('');
            
            const storedCode = localStorage.getItem(`reset_${userEmail}`);
            const storedTime = localStorage.getItem(`reset_time_${userEmail}`);
            
            // Check if code is expired (15 minutes)
            if (Date.now() - parseInt(storedTime) > 15 * 60 * 1000) {
                messageDiv.innerHTML = '<span class="error">Code expired. Please request a new one.</span>';
                setTimeout(() => goToStep(1), 2000);
                return;
            }
            
            if (enteredCode === storedCode) {
                messageDiv.innerHTML = '<span class="success">Code verified! Please set your new password.</span>';
                setTimeout(() => goToStep(3), 1000);
            } else {
                messageDiv.innerHTML = '<span class="error">Invalid code. Please try again.</span>';
                document.querySelectorAll('.code-input input').forEach(input => input.value = '');
                document.querySelector('.code-input input').focus();
            }
        });

        // Password form submission
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('passwordMessage');
            const resetCard = document.getElementById('resetCard');
            
            if (newPassword !== confirmPassword) {
                messageDiv.innerHTML = '<span class="error">Passwords do not match.</span>';
                resetCard.classList.add('shake');
                setTimeout(() => resetCard.classList.remove('shake'), 500);
                return;
            }
            
            if (newPassword.length < 6) {
                messageDiv.innerHTML = '<span class="error">Password must be at least 6 characters long.</span>';
                resetCard.classList.add('shake');
                setTimeout(() => resetCard.classList.remove('shake'), 500);
                return;
            }

            try {
                messageDiv.innerHTML = '<span class="success">Resetting password...</span>';
                
                // For now, just show success (in production, update password in database)
                console.log(`Password reset for ${userEmail}`);
                messageDiv.innerHTML = '<span class="success">Password reset successfully! Redirecting to login...</span>';
                
                // Clear reset data
                localStorage.removeItem(`reset_${userEmail}`);
                localStorage.removeItem(`reset_time_${userEmail}`);
                
                // Redirect to login after 2 seconds
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                
            } catch (error) {
                messageDiv.innerHTML = '<span class="error">Failed to reset password. Please try again.</span>';
                console.error('Password reset error:', error);
            }
        });
    </script>
</body>
</html>
