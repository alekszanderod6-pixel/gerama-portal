<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | GERAMA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .signup-container {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .signup-header {
            background: linear-gradient(135deg, #0a2f1f, #1B5E20);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .signup-header img { width: 80px; margin-bottom: 1rem; }
        .signup-header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .signup-header p { font-size: 0.9rem; opacity: 0.85; }
        .signup-body { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e2a3e; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
        }
        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: linear-gradient(135deg, #FFC107, #FFD54F);
            color: #1B5E20;
            transform: translateY(-2px);
        }
        .message { margin-top: 1rem; text-align: center; font-size: 0.85rem; }
        .error { color: #dc2626; }
        .success { color: #16a34a; }
        .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .login-link a { color: #1B5E20; text-decoration: none; font-weight: 600; }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <img src="images/geramalogo.jpg" alt="GERAMA">
            <h1>Join GERAMA</h1>
            <p>Create your member account</p>
        </div>
        <div class="signup-body">
            <form id="signupForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Invite Code</label>
                    <input type="text" id="inviteCode" placeholder="Enter the secret code" required>
                </div>
                <button type="submit" class="btn">Sign Up →</button>
                <div id="message" class="message"></div>
            </form>
            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
    <script>
        // Check if Supabase is loaded
        window.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded');
            console.log('Supabase available:', typeof window.geramaSupabase !== 'undefined');
            console.log('GERAMA_SECRET_CODE available:', typeof window.GERAMA_SECRET_CODE !== 'undefined');
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            console.log('Form submitted!');
            e.preventDefault();
            
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            console.log('Form values:', { inviteCode, email, username, password: '***' });
            
            // Check if Supabase is loaded
            if (typeof window.geramaSupabase === 'undefined') {
                messageDiv.innerHTML = '<span class="error">Supabase not loaded. Check console for errors.</span>';
                console.error('Supabase client not available');
                return;
            }
            
            if (typeof window.GERAMA_SECRET_CODE === 'undefined') {
                messageDiv.innerHTML = '<span class="error">Secret code not configured.</span>';
                console.error('GERAMA_SECRET_CODE not available');
                return;
            }
            
            // Debug: Log the values to see what's happening
            console.log('Invite code entered:', inviteCode);
            console.log('Expected code:', window.GERAMA_SECRET_CODE);
            console.log('Are they equal?', inviteCode === window.GERAMA_SECRET_CODE);
            console.log('Length of entered:', inviteCode.length);
            console.log('Length of expected:', window.GERAMA_SECRET_CODE.length);
            console.log('Char codes entered:', [...inviteCode].map(c => c.charCodeAt(0)));
            console.log('Char codes expected:', [...window.GERAMA_SECRET_CODE].map(c => c.charCodeAt(0)));
            
            // Try case-insensitive comparison and trim
            const normalizedInput = inviteCode.trim().toUpperCase();
            const normalizedExpected = window.GERAMA_SECRET_CODE.trim().toUpperCase();
            
            console.log('Normalized input:', normalizedInput);
            console.log('Normalized expected:', normalizedExpected);
            console.log('Are normalized equal?', normalizedInput === normalizedExpected);
            
            // Verify secret code first
            if (normalizedInput !== normalizedExpected) {
                messageDiv.innerHTML = `<span class="error">❌ Invalid invite code. Access denied. Entered: "${inviteCode}"</span>`;
                return;
            }
            
            // Show loading state
            messageDiv.innerHTML = '<span class="success">⏳ Creating account...</span>';
            
            try {
                // Sign up with Supabase
                const { data, error } = await window.geramaSupabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            username: username,
                            invite_code_verified: true
                        }
                    }
                });
                
                if (error) {
                    messageDiv.innerHTML = `<span class="error">❌ ${error.message}</span>`;
                    return;
                }
                
                // Store user profile in localStorage for sidebar
                localStorage.setItem('gerama_profile', JSON.stringify({
                    name: username,
                    program: 'GERAMA Member',
                    img: 'https://via.placeholder.com/80?text=' + username.charAt(0).toUpperCase()
                }));
                
                messageDiv.innerHTML = '<span class="success">✅ Account created! Check your email to verify, then login.</span>';
                
                // Redirect to login after 3 seconds
                setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                
            } catch (err) {
                messageDiv.innerHTML = '<span class="error">❌ Registration failed. Please try again.</span>';
                console.error('Signup error:', err);
            }
        });
    </script>
</body>
</html>
